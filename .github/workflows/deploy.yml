# ── GitHub Pages Auto-Deploy ────────────────────────────────────────────────
# Triggers on every push to `main` branch.
# Builds the Vite project and deploys the /dist folder to GitHub Pages.
#
# SETUP STEPS (do this once in your repo):
#   1. Go to Settings → Pages
#   2. Set "Source" to "GitHub Actions"
#   3. Push to main — this workflow handles the rest.
#
# Also update GITHUB_REPO_NAME in vite.config.ts to match your repo name.
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # Allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
